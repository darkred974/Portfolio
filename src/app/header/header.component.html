<header>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <!-- BURGER -->
    <button class="menu-toggle" (click)="toggleMenu()">
        ☰
    </button>

    <!-- OVERLAY (clic dehors pour fermer) -->
    <div class="overlay" *ngIf="menuOpen" (click)="toggleMenu()"></div>

    <!-- NAV -->
    <nav [class.open]="menuOpen">
        <a class="btn" routerLink="">{{ languageService.translate('header.home') }}</a>
        <a class="btn" routerLink="projets">{{ languageService.translate('header.projects') }}</a>
        <a class="btn" routerLink="parcours">{{ languageService.translate('header.parcours') }}</a>
        <a class="btn" routerLink="contact">{{ languageService.translate('header.contact') }}</a>

        <!-- LANGUE DANS LA NAV (mobile/tablette) -->
        <button class="language-btn mobile-lang" (click)="changeLanguage()">
            <img *ngIf="languageService.language === 'FR'" src="./assets/icons8-france-48.png">
            <img *ngIf="languageService.language === 'EN'" src="./assets/icons8-united-kingdom-48.png">
            {{ languageService.language }}
        </button>
    </nav>

    <!-- LANGUE DESKTOP (inchangé) -->
    <button class="language-btn desktop-lang" (click)="changeLanguage()">
        <img *ngIf="languageService.language === 'FR'" src="./assets/icons8-france-48.png">
        <img *ngIf="languageService.language === 'EN'" src="./assets/icons8-united-kingdom-48.png">
        {{ languageService.language }}
    </button>
</header>
